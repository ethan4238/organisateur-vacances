<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Calendrier de Vacances</title>
    
    <!-- Scripts Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* Design System Moderne */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #EC4899;
            --bg-gradient: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --tag-loc: #3B82F6;
            --tag-vibe: #F59E0B;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg-gradient); 
            margin: 0; 
            padding: 0; 
            color: var(--text-main); 
            min-height: 100vh;
        }

        /* --- PAGE DE CONNEXION AVEC IMAGE DE FOND --- */
        #login-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
            
            /* L'image de fond (à placer dans le même dossier sur GitHub) */
            background-image: url('fond.jpg'); 
            
            background-size: cover;
            background-position: center;
        }

        /* Voile sombre sur l'image pour que le texte reste lisible */
        #login-section::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3); 
            z-index: 1;
        }
        
        .login-content {
            position: relative;
            z-index: 2; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-title {
            font-size: 3em; /* Légèrement réduit pour bien faire tenir le titre */
            color: white;
            margin-bottom: 5px;
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        
        .login-subtitle {
            font-size: 1.2em;
            color: white;
            margin-bottom: 35px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            font-weight: 500;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 30px 25px; /* Boîte réduite */
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 290px; /* Boîte réduite */
            border: 1px solid rgba(255,255,255,0.5);
        }

        .login-box input {
            text-align: center;
            font-size: 1.1em;
            padding: 12px;
            letter-spacing: 2px;
            border: 2px solid var(--border);
            border-radius: 8px;
        }
        
        .login-box input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .password-hint {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-top: -2px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* --- APPLICATION PRINCIPALE --- */
        #app-section { 
            display: none; 
            padding: 20px; 
        } 
        
        .container { max-width: 1200px; margin: auto; }

        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; padding-bottom: 20px; border-bottom: 2px solid var(--border);
        }
        h1 { margin: 0; color: var(--primary); font-size: 2em; letter-spacing: -0.5px;}

        #sync-status {
            font-size: 0.9em; font-weight: bold; color: #10B981; display: flex; align-items: center; gap: 8px;
        }
        .pulse {
            width: 10px; height: 10px; background: #10B981; border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        button { 
            background: var(--primary); color: white; border: none; padding: 12px 18px; 
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1em;
            transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
        }
        button:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-outline { background: white; color: var(--text-main); border: 1px solid var(--border); box-shadow: none; }
        .btn-outline:hover { background: #F8FAFC; }
        .btn-danger { background: #EF4444; padding: 6px 10px; font-size: 0.8em; box-shadow: none;}

        input[type="date"], input[type="text"], input[type="password"], input[type="time"], textarea { 
            padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.95em;
        }

        #setup-section { background: var(--card-bg); padding: 40px; border-radius: 16px; box-shadow: var(--shadow); text-align: center; max-width: 500px; margin: 40px auto; }
        .date-inputs { display: flex; gap: 20px; justify-content: center; margin: 30px 0; }
        .date-inputs div { display: flex; flex-direction: column; text-align: left; flex: 1; }

        #calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .day-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; min-height: 180px; cursor: pointer; display: flex; flex-direction: column; box-shadow: var(--shadow); transition: transform 0.2s; }
        .day-card:hover { transform: translateY(-4px); border-color: #C7D2FE; }
        
        .day-date { font-size: 1.2em; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 15px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .card-tag { padding: 4px 10px; border-radius: 20px; font-size: 0.75em; font-weight: 600; color: white;}
        .card-tag.location { background: var(--tag-loc); } .card-tag.vibe { background: var(--tag-vibe); }

        .day-preview { font-size: 0.95em; flex: 1; color: var(--text-muted); }
        .preview-activity { margin: 8px 0; padding-left: 16px; position: relative; display: flex; align-items: flex-start;}
        .preview-activity::before { content: ""; width: 6px; height: 6px; background: var(--secondary); border-radius: 50%; position: absolute; left: 0; top: 6px; }
        .preview-time { font-weight: 700; color: var(--primary); margin-right: 8px; font-size: 0.85em; min-width: 45px; }
        .has-notes { margin-top: 15px; font-size: 0.85em; color: var(--text-muted); background: #F1F5F9; padding: 6px 10px; border-radius: 6px;}

        dialog { border: none; border-radius: 20px; padding: 30px; width: 95%; max-width: 600px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25); }
        dialog::backdrop { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .close-btn { background: #F1F5F9; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2em; cursor: pointer; }
        
        .tag-section { margin-bottom: 20px; background: #F8FAFC; padding: 15px; border-radius: 12px;}
        .tags-container { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { padding: 8px 16px; border-radius: 20px; font-size: 0.85em; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s;}
        .tag.location.active { background: var(--tag-loc); color: white; border-color: var(--tag-loc); }
        .tag.vibe.active { background: var(--tag-vibe); color: white; border-color: var(--tag-vibe); }

        .activity-list { list-style: none; padding: 0; margin-bottom: 20px;}
        .activity-item { background: #F8FAFC; padding: 12px 16px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid var(--border);}
        .activity-item-time { font-weight: 700; color: var(--primary); margin-right: 15px; min-width: 50px;}
        .activity-item-text { flex: 1; font-weight: 500;}
        .activity-input-group { display: flex; gap: 12px; margin-bottom: 30px; background: #F8FAFC; padding: 15px; border-radius: 12px;}
        .activity-input-group input[type="text"] { flex: 1; }
        textarea { width: 100%; box-sizing: border-box; min-height: 120px; resize: vertical; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- === PAGE DE CONNEXION === -->
<div id="login-section">
    <div class="login-content">
        <div class="login-title">Vadrouille chez ton chéri</div>
        <div class="login-subtitle">Une aventure pleine de sensations.</div>

        <div class="login-box">
            <h3 style="margin: 0 0 5px 0; color: var(--primary); font-size: 1.1em;">Accès privé</h3>
            <div class="password-hint">Format attendu : JJ/MM/AAAA</div>
            
            <input type="password" id="password-input" placeholder="JJ/MM/AAAA" onkeypress="if(event.key === 'Enter') checkPassword()">
            
            <button onclick="checkPassword()">Ouvrir le carnet</button>
        </div>
    </div>
</div>

<!-- === APPLICATION PRINCIPALE === -->
<div id="app-section">
    <div class="container">
        <div class="app-header">
            <h1>✈️ Notre Programme</h1>
            <div id="sync-status">
                <div class="pulse"></div> En direct
            </div>
        </div>
        
        <div id="setup-section" style="display: none;">
            <h2>Préparer le voyage</h2>
            <div class="date-inputs">
                <div><label>Début</label><input type="date" id="start-date"></div>
                <div><label>Fin</label><input type="date" id="end-date"></div>
            </div>
            <button style="width: 100%; padding: 15px;" onclick="generateCalendar()">Créer le calendrier</button>
        </div>

        <div id="calendar-section" style="display: none;">
            <div id="calendar-header">
                <h2 id="trip-dates-display" style="margin: 0;">Mes Vacances</h2>
                <button class="btn-outline" onclick="resetTrip()">Nouveau voyage</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>
    </div>
</div>

<dialog id="day-modal">
    <div class="modal-header">
        <h2 id="modal-date-title">Date</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    
    <div class="tag-section"><h4>📍 Lieux</h4><div class="tags-container" id="modal-locations"></div></div>
    <div class="tag-section"><h4>✨ Ambiance</h4><div class="tags-container" id="modal-vibes"></div></div>

    <h3>Programme</h3>
    <ul class="activity-list" id="modal-activities"></ul>
    
    <div class="activity-input-group">
        <input type="time" id="new-activity-time">
        <input type="text" id="new-activity-input" placeholder="Ex: Resto..." onkeypress="if(event.key === 'Enter') addActivity()">
        <button onclick="addActivity()">Ajouter</button>
    </div>

    <h3>Notes</h3>
    <textarea id="modal-notes" placeholder="Adresses, numéros..."></textarea>
    <div style="text-align: right;"><button onclick="saveNotesAndClose()">Enregistrer</button></div>
</dialog>

<script>
    // --- GESTION DU MOT DE PASSE ---
    function checkPassword() {
        const input = document.getElementById('password-input').value;
        if (input === '20/06/2026') {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            connectFirebase();
        } else {
            alert('Mot de passe incorrect 🌴 N\'oubliez pas les barres (/) !');
            document.getElementById('password-input').value = '';
        }
    }

    // --- INITIALISATION FIREBASE ---
    let tripRef = null;
    let tripData = null;
    let currentEditingDate = null;
    const modal = document.getElementById('day-modal');

    function connectFirebase() {
        const firebaseConfig = {
            apiKey: "AIzaSyDnh656o6RrBmEw68KrW-wS8Z7B4HprbsE",
            authDomain: "vacances-justine.firebaseapp.com",
            databaseURL: "https://vacances-justine-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vacances-justine",
            storageBucket: "vacances-justine.firebasestorage.app",
            messagingSenderId: "224749023339",
            appId: "1:224749023339:web:d27c4cc48acfe19d3d812e",
            measurementId: "G-P9WCN2Z2WL"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        tripRef = db.ref('notre-voyage');

        tripRef.on('value', (snapshot) => {
            tripData = snapshot.val();
            initUI();
        });
    }

    const AVAILABLE_LOCATIONS = ["Lyon", "St Etienne", "Grenoble", "Montagne", "Annecy", "Mer", "Campagne"];
    const AVAILABLE_VIBES = ["Chill 😌", "Dynamique 🏃", "Sportive 🧗", "Sociale 🥂", "Amoureux ❤️"];

    function saveData() {
        if (tripRef) tripRef.set(tripData);
    }

    function initUI() {
        if (tripData && tripData.startDate && tripData.endDate) {
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('calendar-section').style.display = 'block';
            renderCalendar();
            
            if(modal.open && currentEditingDate) {
                document.getElementById('modal-notes').value = tripData.days[currentEditingDate]?.notes || '';
                renderModalTags();
                renderModalActivities();
            }
        } else {
            document.getElementById('setup-section').style.display = 'block';
            document.getElementById('calendar-section').style.display = 'none';
        }
    }

    function generateCalendar() {
        const start = document.getElementById('start-date').value;
        const end = document.getElementById('end-date').value;
        if (!start || !end) return alert('Sélectionnez les dates.');
        if (new Date(start) > new Date(end)) return alert('Ordre des dates invalide.');
        tripData = { startDate: start, endDate: end, days: {} };
        saveData();
    }

    function resetTrip() {
        if(confirm('Attention, cela effacera tout. Continuer ?')) {
            tripData = null;
            saveData();
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        
        let currentDate = new Date(tripData.startDate);
        const endDate = new Date(tripData.endDate);

        document.getElementById('trip-dates-display').innerText = 
            `Du ${currentDate.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' })} au ${endDate.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' })}`;

        while (currentDate <= endDate) {
            const dateString = currentDate.toISOString().split('T')[0];
            const dayData = tripData.days?.[dateString] || { activities: [], notes: '', tags: { locations: [], vibes: [] } };
            if(!dayData.tags) dayData.tags = { locations: [], vibes: [] };

            const displayDate = currentDate.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'short' });
            const capitalizedDate = displayDate.charAt(0).toUpperCase() + displayDate.slice(1);

            const card = document.createElement('div');
            card.className = 'day-card';
            card.onclick = () => openDayModal(dateString, capitalizedDate);
            
            let tagsHtml = '<div class="card-tags">';
            if(dayData.tags.locations) dayData.tags.locations.forEach(loc => { tagsHtml += `<span class="card-tag location">${loc}</span>`; });
            if(dayData.tags.vibes) dayData.tags.vibes.forEach(vibe => { tagsHtml += `<span class="card-tag vibe">${vibe}</span>`; });
            tagsHtml += '</div>';

            let previewHtml = '';
            if(dayData.activities) {
                dayData.activities.slice(0, 3).forEach(act => {
                    const timeStr = act.time ? `<span class="preview-time">${act.time}</span>` : '';
                    previewHtml += `<div class="preview-activity">${timeStr}<span>${act.text}</span></div>`;
                });
                if (dayData.activities.length > 3) {
                    previewHtml += `<div class="preview-activity" style="color:var(--primary); font-weight:600; font-size:0.85em;">+ ${dayData.activities.length - 3} autres...</div>`;
                }
            }

            const notesIndicator = (dayData.notes && dayData.notes.trim() !== '') ? `<div class="has-notes">📝 Notes ajoutées</div>` : '';

            card.innerHTML = `
                <div class="day-date">${capitalizedDate}</div>
                ${(dayData.tags.locations?.length > 0 || dayData.tags.vibes?.length > 0) ? tagsHtml : ''}
                <div class="day-preview">${previewHtml}${notesIndicator}</div>
            `;
            
            grid.appendChild(card);
            currentDate.setDate(currentDate.getDate() + 1);
        }
    }

    function openDayModal(dateString, displayDate) {
        currentEditingDate = dateString;
        document.getElementById('modal-date-title').innerText = displayDate;
        
        if (!tripData.days) tripData.days = {};
        if (!tripData.days[dateString]) {
            tripData.days[dateString] = { activities: [], notes: '', tags: { locations: [], vibes: [] } };
        }
        
        document.getElementById('modal-notes').value = tripData.days[dateString].notes || '';
        renderModalTags();
        renderModalActivities();
        modal.showModal();
    }

    function closeModal() {
        modal.close();
        currentEditingDate = null;
    }

    function renderModalTags() {
        const dayTags = tripData.days[currentEditingDate].tags || { locations: [], vibes: [] };
        
        document.getElementById('modal-locations').innerHTML = AVAILABLE_LOCATIONS.map(loc => {
            const isActive = dayTags.locations && dayTags.locations.includes(loc);
            return `<span class="tag location ${isActive ? 'active' : ''}" onclick="toggleTag('locations', '${loc}')">${loc}</span>`;
        }).join('');

        document.getElementById('modal-vibes').innerHTML = AVAILABLE_VIBES.map(vibe => {
            const isActive = dayTags.vibes && dayTags.vibes.includes(vibe);
            return `<span class="tag vibe ${isActive ? 'active' : ''}" onclick="toggleTag('vibes', '${vibe}')">${vibe}</span>`;
        }).join('');
    }

    function toggleTag(category, value) {
        if (!tripData.days[currentEditingDate].tags) tripData.days[currentEditingDate].tags = { locations: [], vibes: [] };
        if (!tripData.days[currentEditingDate].tags[category]) tripData.days[currentEditingDate].tags[category] = [];
        
        const arr = tripData.days[currentEditingDate].tags[category];
        const index = arr.indexOf(value);
        if (index > -1) arr.splice(index, 1);
        else arr.push(value);
        
        saveData();
    }

    function sortActivities() {
        if(!tripData.days[currentEditingDate].activities) return;
        tripData.days[currentEditingDate].activities.sort((a, b) => {
            if (!a.time && !b.time) return 0;
            if (!a.time) return 1;
            if (!b.time) return -1;
            return a.time.localeCompare(b.time);
        });
    }

    function renderModalActivities() {
        const activities = tripData.days[currentEditingDate].activities || [];
        document.getElementById('modal-activities').innerHTML = activities.map((act, index) => {
            const timeStr = act.time ? `<span class="activity-item-time">${act.time}</span>` : '';
            return `
            <li class="activity-item">
                ${timeStr}
                <span class="activity-item-text">${act.text}</span>
                <button class="btn-danger" onclick="deleteActivity(${index})">✕</button>
            </li>`;
        }).join('');
    }

    function addActivity() {
        const textInput = document.getElementById('new-activity-input');
        const timeInput = document.getElementById('new-activity-time');
        const text = textInput.value.trim();
        const time = timeInput.value;

        if (text !== '') {
            if(!tripData.days[currentEditingDate].activities) tripData.days[currentEditingDate].activities = [];
            tripData.days[currentEditingDate].activities.push({ text: text, time: time });
            sortActivities();
            
            textInput.value = '';
            timeInput.value = '';
            saveData();
        }
    }

    function deleteActivity(index) {
        tripData.days[currentEditingDate].activities.splice(index, 1);
        saveData();
    }

    function saveNotesAndClose() {
        tripData.days[currentEditingDate].notes = document.getElementById('modal-notes').value;
        saveData();
        closeModal();
    }
</script>
</body>
</html>
